<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <title>Webtoon Reader</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090909;
      --panel: #151515;
      --panel-soft: rgba(21, 21, 21, 0.78);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f1ea;
      --muted: #b8b0a5;
      --accent: #f24f3d;
      --accent-2: #ffd166;
      --max-page: 520px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 0%, rgba(242, 79, 61, 0.18), transparent 32rem),
        linear-gradient(180deg, #15110f 0%, var(--bg) 34rem);
      color: var(--text);
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .age-gate {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(5, 5, 5, 0.92);
      backdrop-filter: blur(14px);
    }

    .age-card {
      width: min(100%, 390px);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151515;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .age-card h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
    }

    .age-card p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .age-actions {
      display: grid;
      gap: 10px;
    }

    .age-actions button,
    .chapter-button,
    .tool-button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #202020;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .age-actions .primary {
      border-color: rgba(242, 79, 61, 0.55);
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .app-shell {
      width: min(100%, var(--max-page));
      margin: 0 auto;
      padding-bottom: max(34px, env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(9, 9, 9, 0.86);
      backdrop-filter: blur(16px);
    }

    .progress {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 120ms linear;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
    }

    .title-block {
      min-width: 0;
    }

    .title-block h1 {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.25;
    }

    .title-block p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .tool-group {
      display: flex;
      gap: 8px;
    }

    .tool-button {
      width: 42px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .chapter-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      padding: 0 12px 10px;
      scrollbar-width: none;
    }

    .chapter-nav::-webkit-scrollbar {
      display: none;
    }

    .chapter-button {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 14px;
      color: var(--muted);
      font-size: 13px;
      background: rgba(255, 255, 255, 0.06);
    }

    .chapter-button.is-active {
      border-color: rgba(242, 79, 61, 0.72);
      color: white;
      background: rgba(242, 79, 61, 0.22);
    }

    .cover {
      padding: 32px 18px 24px;
      min-height: 42vh;
      display: grid;
      align-content: end;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(9, 9, 9, 0) 0%, rgba(9, 9, 9, 0.86) 80%),
        url("Comics_Story1_01.jpg") center top / cover;
    }

    .cover-kicker {
      width: fit-content;
      margin-bottom: 10px;
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.42);
      font-size: 12px;
      color: #fff3dc;
    }

    .cover h2 {
      margin: 0;
      font-size: clamp(32px, 11vw, 52px);
      line-height: 0.95;
      text-shadow: 0 5px 20px rgba(0, 0, 0, 0.65);
    }

    .cover p {
      max-width: 32em;
      margin: 12px 0 0;
      color: #e4d9ce;
      line-height: 1.65;
      font-size: 14px;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.8);
    }

    .reader {
      background: #000;
    }

    .episode {
      scroll-margin-top: 96px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .episode-heading {
      padding: 20px 16px 16px;
      background:
        linear-gradient(90deg, rgba(242, 79, 61, 0.2), transparent),
        #0d0d0d;
    }

    .episode-heading span {
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .episode-heading h3 {
      margin: 6px 0 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .page {
      position: relative;
      margin: 0;
      background: #050505;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      min-height: 140px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .page::after {
      content: attr(data-page);
      position: absolute;
      right: 8px;
      bottom: 8px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.52);
      color: rgba(255, 255, 255, 0.72);
      font-size: 10px;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .show-page-number .page::after {
      opacity: 1;
    }

    .end-panel {
      padding: 28px 18px 42px;
      text-align: center;
      background: #111;
    }

    .end-panel h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .end-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .float-tools {
      position: fixed;
      right: max(12px, calc((100vw - var(--max-page)) / 2 + 12px));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 18;
      display: grid;
      gap: 8px;
    }

    .float-tools .tool-button {
      background: var(--panel-soft);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.34);
    }

    @media (min-width: 720px) {
      body {
        background:
          linear-gradient(90deg, #0f0d0c 0%, #090909 22%, #090909 78%, #0f0d0c 100%);
      }

      .app-shell {
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 30px 90px rgba(0, 0, 0, 0.45);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .progress-fill,
      .page::after {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="age-gate" id="ageGate">
    <section class="age-card" aria-labelledby="ageTitle">
      <h1 id="ageTitle">年齡確認</h1>
      <p>此閱讀頁使用本機資料夾中的成人向漫畫示意圖。請確認你已達所在地法定成年年齡後再進入。</p>
      <div class="age-actions">
        <button class="primary" id="enterButton" type="button">我已成年，進入閱讀</button>
        <button id="leaveButton" type="button">離開</button>
      </div>
    </section>
  </div>

  <main class="app-shell" id="top">
    <header class="topbar">
      <div class="progress" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="toolbar">
        <div class="title-block">
          <h1>韓式長條漫畫閱讀器</h1>
          <p id="readStatus">20 張圖片</p>
        </div>
        <div class="tool-group">
          <button class="tool-button" id="togglePage" type="button" title="顯示頁碼" aria-label="顯示頁碼">#</button>
          <button class="tool-button" id="toggleFit" type="button" title="切換寬度" aria-label="切換寬度">↔</button>
        </div>
      </div>
      <nav class="chapter-nav" id="chapterNav" aria-label="章節"></nav>
    </header>

    <section class="cover">
      <div>
        <div class="cover-kicker">Vertical Webtoon Layout</div>
        <h2>Story<br>Collection</h2>
        <p>以手機直向滑動為核心，把原始漫畫圖整理成韓漫常見的沉浸式長條閱讀版面。</p>
      </div>
    </section>

    <section class="reader" id="reader" aria-label="漫畫內容"></section>

    <section class="end-panel">
      <h3>已讀到底</h3>
      <p>可以用右下角按鈕回到頂部，或從上方章節列切換段落。</p>
    </section>
  </main>

  <div class="float-tools" aria-label="快速操作">
    <button class="tool-button" id="toTop" type="button" title="回到頂部" aria-label="回到頂部">↑</button>
  </div>

  <script>
    const chapters = [
      {
        id: "story1",
        label: "Story 1",
        title: "第一段",
        files: [
          "Comics_Story1_01.jpg",
          "Comics_Story1_02.jpg",
          "Comics_Story1_03-1.jpg",
          "Comics_Story1_03-2.jpg",
          "Comics_Story1_04.jpg",
          "Comics_Story1_05.jpg",
          "Comics_Story1_06.jpg",
          "Comics_Story1_07.jpg",
          "Comics_Story1_08.jpg",
          "Comics_Story1_09.jpg",
          "Comics_Story1_10.jpg"
        ]
      },
      {
        id: "story2",
        label: "Story 2",
        title: "第二段",
        files: [
          "Comics_Story2_01.jpg",
          "Comics_Story2_02.jpg",
          "Comics_Story2_03.jpg",
          "Comics_Story2_04.jpg",
          "Comics_Story2_05.jpg",
          "Comics_Story2_06.jpg"
        ]
      },
      {
        id: "story3",
        label: "Story 3",
        title: "第三段",
        files: [
          "Comics_Story3_01.jpg",
          "Comics_Story3_02.jpg",
          "Comics_Story3_03.jpg"
        ]
      },
      {
        id: "story4",
        label: "Story 4",
        title: "第四段",
        files: [
          "Comics_Story4_01.jpg",
          "Comics_Story4_02.jpg",
          "Comics_Story4_03.jpg",
          "Comics_Story4_04.jpg",
          "Comics_Story4_05.jpg",
          "Comics_Story4_06.jpg"
        ]
      }
    ];

    const totalPages = chapters.reduce((sum, chapter) => sum + chapter.files.length, 0);
    const reader = document.querySelector("#reader");
    const chapterNav = document.querySelector("#chapterNav");
    const progressFill = document.querySelector("#progressFill");
    const readStatus = document.querySelector("#readStatus");
    const ageGate = document.querySelector("#ageGate");
    let pageIndex = 1;

    readStatus.textContent = `${chapters.length} 段 / ${totalPages} 張圖片`;

    chapters.forEach((chapter) => {
      const button = document.createElement("button");
      button.className = "chapter-button";
      button.type = "button";
      button.textContent = chapter.label;
      button.addEventListener("click", () => {
        document.querySelector(`#${chapter.id}`).scrollIntoView({ behavior: "smooth" });
      });
      chapterNav.appendChild(button);

      const section = document.createElement("section");
      section.className = "episode";
      section.id = chapter.id;
      section.dataset.label = chapter.label;
      section.innerHTML = `
        <div class="episode-heading">
          <span>${chapter.label}</span>
          <h3>${chapter.title}</h3>
        </div>
      `;

      chapter.files.forEach((file) => {
        const figure = document.createElement("figure");
        figure.className = "page";
        figure.dataset.page = String(pageIndex).padStart(2, "0");
        figure.innerHTML = `<img src="${file}" alt="${chapter.label} page ${pageIndex}" loading="lazy" decoding="async">`;
        section.appendChild(figure);
        pageIndex += 1;
      });

      reader.appendChild(section);
    });

    const navButtons = Array.from(document.querySelectorAll(".chapter-button"));
    const sections = Array.from(document.querySelectorAll(".episode"));
    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

      if (!visible) return;
      const index = sections.indexOf(visible.target);
      navButtons.forEach((button, buttonIndex) => {
        button.classList.toggle("is-active", buttonIndex === index);
      });
    }, { rootMargin: "-42% 0px -46% 0px", threshold: [0, 0.2, 0.6] });

    sections.forEach((section) => observer.observe(section));
    navButtons[0]?.classList.add("is-active");

    window.addEventListener("scroll", () => {
      const scrollable = document.documentElement.scrollHeight - window.innerHeight;
      const progress = scrollable <= 0 ? 0 : (window.scrollY / scrollable) * 100;
      progressFill.style.width = `${Math.min(100, Math.max(0, progress))}%`;
    }, { passive: true });

    document.querySelector("#togglePage").addEventListener("click", () => {
      document.body.classList.toggle("show-page-number");
    });

    document.querySelector("#toggleFit").addEventListener("click", () => {
      const wide = document.documentElement.style.getPropertyValue("--max-page") === "720px";
      document.documentElement.style.setProperty("--max-page", wide ? "520px" : "720px");
    });

    document.querySelector("#toTop").addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.querySelector("#enterButton").addEventListener("click", () => {
      sessionStorage.setItem("adultConfirmed", "yes");
      ageGate.remove();
    });

    document.querySelector("#leaveButton").addEventListener("click", () => {
      document.body.innerHTML = "";
      document.body.style.background = "#090909";
    });

    if (sessionStorage.getItem("adultConfirmed") === "yes") {
      ageGate.remove();
    }
  </script>
</body>
</html>
